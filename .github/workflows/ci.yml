name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python (labs 1-4) ──────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Python unit tests
        run: uv run pytest -m "not integration and not eval" --tb=short

      # ── Node (lab5) ────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lab5/package-lock.json

      - name: Install lab5 dependencies
        run: npm ci
        working-directory: lab5

      - name: Lab5 unit tests
        run: npm test
        working-directory: lab5
